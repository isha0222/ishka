<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories 📸</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#000814,#001d3d,#003566);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
    padding:30px;
    position:relative;
}

/* stars */
.stars span{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation: twinkle 4s infinite alternate;
}
@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

/* heading */
.header{
    text-align:center;
    margin-bottom:50px;
}
.header h1{
    font-size:50px;
    font-family:'Playfair Display',serif;
    text-shadow:0 0 15px #00b4d8;
}
.header p{
    color:#d9faff;
    margin-top:10px;
}

/* scrapbook */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
}

.photo{
    width:250px;
    background:white;
    padding:10px 10px 30px;
    border-radius:8px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
    transform:rotate(calc(-5deg + 10deg * var(--i)));
    transition:0.4s;
    cursor:pointer;
    position:relative;
}

.photo img{
    width:100%;
    height:280px;
    object-fit:cover;
    border-radius:5px;
}

.photo p{
    color:#001d3d;
    text-align:center;
    margin-top:10px;
    font-weight:600;
}

.photo:hover{
    transform:scale(1.08) rotate(0deg);
    box-shadow:0 0 25px #00b4d8;
}

/* popup */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.popup img{
    max-width:90%;
    max-height:70%;
    border-radius:10px;
    box-shadow:0 0 20px #00b4d8;
}

.popup p{
    margin-top:20px;
    font-size:20px;
    text-align:center;
}

.popup button{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    border-radius:20px;
    background:#00b4d8;
    color:white;
    cursor:pointer;
}

/* next btn */
.btn{
    display:block;
    width:max-content;
    margin:50px auto;
    text-decoration:none;
    background:#00b4d8;
    color:white;
    padding:14px 35px;
    border-radius:30px;
    box-shadow:0 0 15px #00b4d8;
}

/* responsive */
@media(max-width:768px){
    .header h1{
        font-size:28px;
    }
    .photo{
        width:180px;
    }
    .photo img{
        height:220px;
    }
}

.hidden-hearts{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
}

.secret-heart{
    position:absolute;
    font-size:22px;
    cursor:pointer;
    pointer-events:auto;
    animation: pulse 1.5s infinite;
}

.secret-heart:nth-child(1){ top:20%; left:10%; }
.secret-heart:nth-child(2){ top:35%; right:15%; }
.secret-heart:nth-child(3){ bottom:30%; left:20%; }
.secret-heart:nth-child(4){ bottom:20%; right:10%; }
.secret-heart:nth-child(5){ top:60%; right:20%; }

@keyframes pulse{
    0%,100%{ transform:scale(1);}
    50%{ transform:scale(1.3);}
}

</style>
</head>
<body>

<div class="stars"></div>

<div class="header">
    <h1>Our Beautiful Memories 📸</h1>
    <p>Every picture tells our love story 💙</p>
</div>

<div class="gallery">

    <div class="photo" style="--i:1" onclick="openPopup('p1.png','Our First Picture Together ❤️')">
        <img src="p1.png" alt="">
        <p>First Pic 📷</p>
    </div>

    <div class="photo" style="--i:2" onclick="openPopup('p2.png','Our First Date 🌸')">
        <img src="p2.png" alt="">
        <p>First Kiss💕</p>
    </div>

    <div class="photo" style="--i:3" onclick="openPopup('p3.png','Our Cute Selfie 😘')">
        <img src="p3.png" alt="">
        <p>Movie Date💙</p>
    </div>

    <div class="photo" style="--i:4" onclick="openPopup('p7.png','His Day 💕')">
        <img src="p7.png" alt="">
        <p>His 1St Birthday ♾️</p>
    </div>
    <div class="photo" style="--i:5" onclick="openPopup('p8.png','My Day 💕')">
        <img src="p8.png" alt="">
        <p>My 1St Birthday ♾️</p>
    </div>
    <div class="photo" style="--i:6" onclick="openPopup('p4.png','Concert Date 💙')">
        <img src="p4.png" alt="">
        <p>Concert 💙</p>
    </div>
    <div class="photo" style="--i:7" onclick="openPopup('p5.png','ToV🌸')">
        <img src="p5.png" alt="">
        <p>ToV 🌸</p>
    </div>
    <div class="photo" style="--i:8" onclick="openPopup('p2.png','Us♾️💕')">
        <img src="p6.png" alt="">
        <p>Us ♾️💕</p>
    </div>

</div>

<div class="hidden-hearts">
    <span class="secret-heart" onclick="collectHeart(this)">💙</span>
    <span class="secret-heart" onclick="collectHeart(this)">❤️</span>
    <span class="secret-heart" onclick="collectHeart(this)">💌</span>
    <span class="secret-heart" onclick="collectHeart(this)">💖</span>
    <span class="secret-heart" onclick="collectHeart(this)">✨</span>
</div>

<div class="popup" id="secretPopup">
    <img src="c1.jpeg" style="max-width:200px;border-radius:10px;margin-bottom:15px;">
    <p>You found all my hidden love notes ❤️<br>I Love You Forever ♾️</p>
    <button onclick="closeSecret()">Close ✨</button>
</div>

<a href="reasons.html" class="btn">Next Page ❤️</a>

<div class="popup" id="popup">
    <img id="popupImg">
    <p id="popupText"></p>
    <button onclick="closePopup()">Close ✨</button>
</div>
<audio id="bgMusic" loop>
    <source src="a2.m4a" type="audio/mp4">
</audio>
<script>
// stars
for(let i=0;i<100;i++){
    let star=document.createElement("span");
    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";
    star.style.animationDuration=(Math.random()*3+2)+"s";
    document.querySelector(".stars").appendChild(star);
}

// popup
function openPopup(img,text){
    document.getElementById("popup").style.display="flex";
    document.getElementById("popupImg").src=img;
    document.getElementById("popupText").innerText=text;
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

let count=0;

function collectHeart(el){
    el.style.display="none";
    count++;

    if(count===5){
        document.getElementById("secretPopup").style.display="flex";
    }
}

function closeSecret(){
    document.getElementById("secretPopup").style.display="none";
}

window.addEventListener("load", function () {
    const music = document.getElementById("bgMusic");

    music.play().catch(() => {
        document.addEventListener("click", function () {
            music.play();
        }, { once:true });

        document.addEventListener("touchstart", function () {
            music.play();
        }, { once:true });
    });
});
</script>

</body>
</html>
